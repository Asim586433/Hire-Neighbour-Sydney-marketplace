<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Hire Neighbour · Sydney Marketplace</title>
    <style>
        /* --------------------------------------------- */
        /* modern, mobile-first, startup style           */
        /* --------------------------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f4f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 480px;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border-radius: 32px 32px 0 0;
            overflow: hidden;
            position: relative;
            margin: 1rem auto;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 900px) {
            #app {
                max-width: 1200px;
                border-radius: 24px;
                display: grid;
                grid-template-columns: 260px 1fr;
                height: 95vh;
            }
            .mobile-nav { display: none; }
            .desktop-sidebar { display: block; background: #f9fafc; border-right: 1px solid #eef2f6; }
        }

        .desktop-sidebar { display: none; padding: 1.8rem 1rem; overflow-y: auto; }
        .desktop-sidebar .logo { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; margin-bottom: 2.5rem; color: #0a2540; }
        .desktop-sidebar .logo span { background: #635bff; color: white; padding: 4px 8px; border-radius: 12px; font-size: 0.9rem; margin-left: 4px; }
        .desktop-sidebar nav a { display: flex; padding: 0.8rem 1rem; margin: 4px 0; border-radius: 14px; color: #3c4a5c; font-weight: 500; text-decoration: none; cursor: pointer; }
        .desktop-sidebar nav a.active { background: #e9ecf3; color: #0a2540; }

        .header {
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eef2f6;
            background: white;
        }
        .logo-mobile { font-weight: 700; font-size: 1.4rem; color: #0a2540; cursor: pointer; }
        .header-icons { display: flex; gap: 1.2rem; color: #5f6c80; }
        .header-icons span { cursor: pointer; }
        
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 1rem;
            background: white;
            border-top: 1px solid #edf2f7;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
        .bottom-nav span { font-size: 0.7rem; display: block; color: #5f6b7a; }
        .nav-icon { text-align: center; cursor: pointer; }
        .nav-icon.active { color: #635bff; }

        .main-content {
            padding: 1.2rem 1rem 2rem;
            background: white;
            flex: 1;
            overflow-y: auto;
        }

        .section-title { font-weight: 600; font-size: 1.1rem; margin: 1.2rem 0 0.6rem; color: #1e293b; }
        .card {
            background: white;
            border-radius: 22px;
            padding: 1rem;
            box-shadow: 0 8px 20px -6px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.02);
            border: 1px solid #f0f4f9;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); }
        .flex-row { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
        .badge {
            background: #e8edf5; padding: 4px 12px; border-radius: 40px; font-size: 0.75rem; font-weight: 500;
        }
        .badge.success { background: #e3f2ef; color: #0b6b5a; }
        .badge.warning { background: #fff1db; color: #a85d00; }
        .badge.primary { background: #e1e3ff; color: #2a2f8b; }
        .badge.error { background: #ffe5e5; color: #b91c1c; }

        .btn {
            background: #f1f4f9; border: none; border-radius: 40px; padding: 0.7rem 1.2rem;
            font-weight: 500; color: #1e293b; cursor: pointer; transition: all 0.1s;
            font-size: 0.9rem;
        }
        .btn-primary { background: #0a2540; color: white; box-shadow: 0 8px 14px -8px #0a254050; }
        .btn-primary:hover { background: #1b3b5c; }
        .btn-success { background: #10b981; color: white; }
        .btn-outline { background: transparent; border: 1px solid #d0d9e8; }

        .role-switch {
            background: #f4f7fd; border-radius: 40px; padding: 4px; display: inline-flex;
            flex-wrap: wrap; margin: 1rem 0; width: 100%;
        }
        .role-switch button {
            background: transparent; border: none; border-radius: 40px; padding: 0.5rem 0.8rem;
            font-size: 0.75rem; font-weight: 500; color: #4a5a72; cursor: pointer; flex: 1;
        }
        .role-switch button.active { background: white; box-shadow: 0 2px 6px #d0d9e8; color: #0a2540; }

        .table-mini { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .table-mini td { padding: 0.5rem 0; border-bottom: 1px solid #edf2f9; }

        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(2px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-card { background: white; width: 90%; max-width: 360px; border-radius: 32px; padding: 1.8rem; max-height: 80vh; overflow-y: auto; }

        .map-placeholder { background: #cbd5e1; height: 160px; border-radius: 28px; display: flex; align-items: center; justify-content: center; color: #334155; font-size: 0.9rem; background-image: radial-gradient(circle at 20px 30px, #a0afc0 2px, transparent 2px), linear-gradient(#b3c2d1, #9aafc4); background-size: 40px 40px, 100%; }

        .chart-bar { height: 8px; background: #635bff; border-radius: 20px; }
        .toast-message { background: #1e293b; color: white; padding: 0.8rem 1.5rem; border-radius: 60px; font-size: 0.9rem; box-shadow: 0 10px 25px -8px black; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 1200; animation: fade 2s forwards; pointer-events: none; }
        @keyframes fade { 0%{ opacity:0; bottom:80px } 15%{ opacity:1; bottom:100px } 85%{ opacity:1 } 100%{ opacity:0; bottom:80px } }

        .photo-upload { width: 80px; height: 80px; background: #f0f4fc; border-radius: 16px; display: flex; align-items: center; justify-content: center; border: 2px dashed #a0b3cc; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem; border-radius: 16px; border: 1px solid #dde3ed; font-size: 1rem; }

        .star-rating { color: #fbbf24; font-size: 1.2rem; }
    </style>
</head>
<body>
<div id="app">
    <!-- desktop sidebar -->
    <div class="desktop-sidebar">
        <div class="logo">HIRE<span>neighbour</span></div>
        <nav id="desktopNav">
            <a class="active" data-page="home">🏠 Home</a>
            <a data-page="search">🔍 Search</a>
            <a data-page="bookings">📦 Bookings</a>
            <a data-page="jobs">🚗 Driver Jobs</a>
            <a data-page="messages">💬 Messages</a>
            <a data-page="dashboard">📊 Dashboard</a>
        </nav>
    </div>

    <!-- main mobile area -->
    <div style="display: flex; flex-direction: column; height: 100%;">
        <!-- header -->
        <div class="header">
            <div class="logo-mobile" onclick="window.app.showPage('home')">Hire<span style="color:#635bff;">.</span></div>
            <div class="header-icons">
                <span onclick="window.app.showPage('search')">🔍</span> 
                <span onclick="window.app.showNotifications()">🔔</span> 
                <span onclick="window.app.showAuth()">👤</span>
            </div>
        </div>

        <!-- role switcher -->
        <div style="padding: 0 1rem;">
            <div class="role-switch" id="roleSwitcher">
                <button class="active" data-role="renter">Renter</button>
                <button data-role="host">Host</button>
                <button data-role="driver">Driver</button>
                <button data-role="support">Support</button>
                <button data-role="admin">Admin</button>
            </div>
        </div>

        <!-- main content area -->
        <div class="main-content" id="mainContent"></div>

        <!-- bottom mobile nav -->
        <div class="bottom-nav">
            <div class="nav-icon active" data-page="home" onclick="window.app.showPage('home')">🏠<span>Home</span></div>
            <div class="nav-icon" data-page="search" onclick="window.app.showPage('search')">🔎<span>Search</span></div>
            <div class="nav-icon" data-page="bookings" onclick="window.app.showPage('bookings')">📦<span>Book</span></div>
            <div class="nav-icon" data-page="messages" onclick="window.app.showPage('messages')">💬<span>Chat</span></div>
            <div class="nav-icon" data-page="profile" onclick="window.app.showPage('profile')">👤<span>Profile</span></div>
        </div>
    </div>
</div>

<script>
(function() {
    // ==================== DUMMY DATA ====================
    const appState = {
        currentUser: { id: 1, name: 'Alex', role: 'renter', phone: '+61412345678', verified: true },
        currentRole: 'renter',
        currentPage: 'home',
        notifications: 3
    };

    const users = [
        { id: 1, name: 'Alex Chen', role: 'renter', suburb: 'Bondi', rating: 4.9, joined: '2024-01', status: 'active' },
        { id: 2, name: 'Bob Smith', role: 'host', suburb: 'Surry Hills', rating: 4.8, listings: 3, status: 'active' },
        { id: 3, name: 'Charlie Brown', role: 'driver', vehicle: 'Toyota HiAce (Ute)', suburb: 'Parramatta', rating: 4.7, status: 'active' },
        { id: 4, name: 'Dana White', role: 'support', status: 'active' },
        { id: 5, name: 'Elena Rodriguez', role: 'admin', status: 'active' },
        { id: 6, name: 'Fiona Zhang', role: 'renter', suburb: 'Chatswood', rating: 4.5, status: 'suspended' }
    ];

    const listings = [
        { id: 101, title: 'Secure Garage in Bondi', hostId: 2, host: 'Bob Smith', size: '25 m²', price: 120, weekly: 120, rating: 4.9, suburb: 'Bondi', type: 'Garage', image: '🖼️', status: 'active', description: 'Lock-up garage, secure access, 24/7 availability', coordinates: { lat: -33.89, lng: 151.27 } },
        { id: 102, title: 'Spare Room Storage', hostId: 2, host: 'Bob Smith', size: '18 m²', price: 85, weekly: 85, rating: 4.7, suburb: 'Randwick', type: 'Room', image: '🖼️', status: 'active', description: 'Clean, dry room in apartment' },
        { id: 103, title: 'Storage Cage North Sydney', hostId: 7, host: 'Mike Jones', size: '12 m²', price: 60, weekly: 60, rating: 4.5, suburb: 'North Sydney', type: 'Cage', image: '🖼️', status: 'pending', description: 'Secure cage in basement' },
        { id: 104, title: 'Warehouse Corner', hostId: 8, host: 'Sarah Lee', size: '50 m²', price: 250, weekly: 250, rating: 5.0, suburb: 'Alexandria', type: 'Warehouse', image: '🖼️', status: 'active' }
    ];

    const bookings = [
        { id: 501, renterId: 1, renter: 'Alex Chen', listingId: 101, listing: 'Secure Garage in Bondi', dates: '10-17 May 2024', total: 120, status: 'confirmed', payment: 'paid', hostId: 2, driverId: null },
        { id: 502, renterId: 1, renter: 'Alex Chen', listingId: 102, listing: 'Spare Room Storage', dates: '22-30 May 2024', total: 680, status: 'requested', payment: 'pending', hostId: 2, driverId: null },
        { id: 503, renterId: 6, renter: 'Fiona Zhang', listingId: 103, listing: 'Storage Cage', dates: '15-20 May', total: 300, status: 'active', payment: 'paid', hostId: 7, driverId: null }
    ];

    const transportJobs = [
        { id: 301, renterId: 1, renter: 'Alex Chen', from: 'Bondi', to: 'Randwick', item: 'boxes (6 boxes)', vehicle: 'ute', status: 'requested', quoted: 65, driverId: null, notes: 'Need help loading' },
        { id: 302, renterId: 6, renter: 'Fiona Zhang', from: 'CBD', to: 'Manly', item: 'furniture (sofa, table)', status: 'in_transit', driverId: 3, driver: 'Charlie Brown', quoted: 120 },
        { id: 303, renterId: 1, renter: 'Alex Chen', from: 'Chatswood', to: 'North Sydney', item: 'boxes', status: 'completed', driverId: 3, quoted: 80 }
    ];

    const messages = {
        501: [
            { from: 'Alex Chen', msg: 'Hi Bob, is the garage available next week?', time: '10:20', date: '2024-05-01' },
            { from: 'Bob Smith', msg: 'Yes, feel free to book!', time: '10:22', date: '2024-05-01' }
        ],
        301: [
            { from: 'Alex Chen', msg: 'Can you bring a hand truck?', time: '09:10', date: '2024-05-02' },
            { from: 'Charlie Brown', msg: 'Sure, I have one.', time: '09:15', date: '2024-05-02' }
        ]
    };

    const reviews = [
        { id: 1, from: 'Alex Chen', to: 'Bob Smith', type: 'host', rating: 5, comment: 'Great host, secure space', date: '2024-04-15' },
        { id: 2, from: 'Alex Chen', to: 'Charlie Brown', type: 'driver', rating: 4, comment: 'On time, careful with boxes', date: '2024-04-16' }
    ];

    const payments = [
        { id: 1001, type: 'customer', amount: 120, status: 'succeeded', date: '2024-05-01', bookingId: 501 },
        { id: 1002, type: 'payout', to: 'Bob Smith', amount: 102, status: 'paid', date: '2024-05-02' } // after fee
    ];

    const disputes = [
        { id: 201, bookingId: 503, reason: 'Item damaged', status: 'open', reportedBy: 'Fiona Zhang' }
    ];

    // ==================== UTILITIES ====================
    function showToast(text, duration = 2000) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = text;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    // ==================== PAGE RENDERER ====================
    function renderPage(page, role = appState.currentRole) {
        const container = document.getElementById('mainContent');
        if (!container) return;

        let html = '';
        
        // Update active nav states
        document.querySelectorAll('.nav-icon, #desktopNav a').forEach(el => {
            el.classList.remove('active');
            if (el.dataset.page === page) el.classList.add('active');
        });

        switch(page) {
            case 'home':
                html = renderHome(role);
                break;
            case 'search':
                html = renderSearch(role);
                break;
            case 'bookings':
                html = renderBookings(role);
                break;
            case 'jobs':
                html = renderJobs(role);
                break;
            case 'messages':
                html = renderMessages(role);
                break;
            case 'profile':
                html = renderProfile(role);
                break;
            case 'dashboard':
                html = renderDashboard(role);
                break;
            case 'listing-detail':
                html = renderListingDetail(role);
                break;
            case 'create-listing':
                html = renderCreateListing(role);
                break;
            default:
                html = renderHome(role);
        }

        container.innerHTML = html;
        attachEventListeners();
    }

    function renderHome(role) {
        if (role === 'renter') {
            return `
                <div class="card" style="padding:0.5rem 1rem;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span>🔍</span>
                        <input type="text" placeholder="Search Bondi, Surry Hills..." id="searchInput" style="border:0;background:#f0f4fc;padding:0.8rem;border-radius:60px;width:100%;">
                    </div>
                </div>
                <div class="flex-row">
                    <span class="badge" onclick="window.app.filterBy('suburb','Bondi')">📍 Bondi</span>
                    <span class="badge" onclick="window.app.filterBy('price','0-200')">💰 $0-200</span>
                    <span class="badge" onclick="window.app.filterBy('type','Garage')">📦 Garage</span>
                    <button class="btn" style="padding:0.3rem 1rem;" onclick="window.app.showFilters()">Filter</button>
                </div>
                <div class="map-placeholder" style="margin:1rem 0; cursor:pointer;" onclick="window.app.showMap()">
                    🗺️ 14 storage spots near you · tap to view
                </div>
                <div class="section-title">✨ Featured Storage</div>
                ${listings.filter(l => l.status === 'active').map(l => `
                    <div class="card flex-row" style="justify-content:space-between; cursor:pointer;" onclick="window.app.showListingDetail(${l.id})">
                        <div><span style="font-size:2rem;">${l.image}</span></div>
                        <div style="flex:2"><b>${l.title}</b><br>${l.suburb} · ★ ${l.rating} · $${l.weekly}/wk</div>
                        <div><button class="btn btn-primary" onclick="event.stopPropagation(); window.app.bookNow(${l.id})">Book</button></div>
                    </div>
                `).join('')}
                <div class="section-title">🚗 Need a Driver?</div>
                <div class="card" onclick="window.app.showPage('jobs')">
                    <div class="flex-row"><span>🚚 Moving items? Get an instant quote</span><button class="btn btn-primary">Request</button></div>
                </div>
                <div class="section-title">📋 Recent Activity</div>
                <div class="card">
                    <div>✅ Booking confirmed: Garage Bondi</div>
                    <div class="flex-row"><span>⭐ Rate your host</span><button class="btn" onclick="window.app.showReview(501)">Review</button></div>
                </div>
            `;
        }
        return `<div class="card">Welcome to ${role} dashboard</div>`;
    }

    function renderSearch(role) {
        return `
            <div class="card">
                <input type="text" placeholder="Search by suburb..." style="width:100%; padding:1rem; border-radius:60px; border:1px solid #eef2f6;">
            </div>
            <div class="flex-row">
                <select class="badge" style="padding:8px;">
                    <option>Price: low to high</option>
                    <option>Price: high to low</option>
                    <option>Rating</option>
                </select>
                <span class="badge">Size</span>
                <span class="badge">Type</span>
            </div>
            <div class="map-placeholder" style="height:120px;">Map view with pins</div>
            ${listings.map(l => `
                <div class="card flex-row" onclick="window.app.showListingDetail(${l.id})">
                    <div>${l.image}</div>
                    <div><b>${l.title}</b><br>★ ${l.rating} · $${l.weekly}/wk</div>
                </div>
            `).join('')}
        `;
    }

    function renderBookings(role) {
        const userBookings = bookings.filter(b => b.renterId === 1);
        return `
            <div class="section-title">Current Bookings</div>
            ${userBookings.map(b => `
                <div class="card">
                    <div class="flex-row"><b>${b.listing}</b> <span class="badge ${b.status}">${b.status}</span></div>
                    <div>📅 ${b.dates}</div>
                    <div>💰 $${b.total}</div>
                    <div class="flex-row">
                        <button class="btn btn-outline" onclick="window.app.viewBooking(${b.id})">View</button>
                        ${b.status === 'confirmed' ? '<button class="btn btn-primary" onclick="window.app.messageHost('+b.hostId+')">Message Host</button>' : ''}
                    </div>
                </div>
            `).join('')}
            <div class="section-title">Booking States Demo</div>
            <div class="flex-row">
                <span class="badge">draft</span> <span class="badge warning">requested</span> <span class="badge success">accepted</span>
                <span class="badge error">rejected</span> <span class="badge">payment_pending</span> <span class="badge success">confirmed</span>
                <span class="badge">active</span> <span class="badge success">completed</span> <span class="badge error">cancelled</span> <span class="badge warning">disputed</span>
            </div>
        `;
    }

    function renderJobs(role) {
        return `
            <div class="section-title">Available Transport Jobs</div>
            ${transportJobs.filter(j => j.status === 'requested').map(j => `
                <div class="card">
                    <div><b>${j.from} → ${j.to}</b></div>
                    <div>📦 ${j.item} · 🚐 ${j.vehicle || 'any'}</div>
                    <div>💰 $${j.quoted}</div>
                    <button class="btn btn-primary" onclick="window.app.acceptJob(${j.id})">Accept Job</button>
                </div>
            `).join('')}
            <div class="section-title">Job States</div>
            <div class="flex-row">
                <span class="badge warning">requested</span> <span class="badge">quoted</span> <span class="badge success">accepted</span>
                <span class="badge primary">in_transit</span> <span class="badge success">completed</span> <span class="badge error">cancelled</span> <span class="badge warning">disputed</span>
            </div>
        `;
    }

    function renderMessages(role) {
        return `
            <div class="section-title">Messages</div>
            <div class="card" onclick="window.app.openChat(501)">
                <div class="flex-row"><b>Bob (Host)</b> <span style="color:#6b7280;">Garage Bondi</span></div>
                <div>Last message: ${messages[501]?.slice(-1)[0]?.msg || 'Available?'}</div>
            </div>
            <div class="card" onclick="window.app.openChat(301)">
                <div class="flex-row"><b>Charlie (Driver)</b> <span style="color:#6b7280;">Moving job</span></div>
                <div>Last message: ${messages[301]?.slice(-1)[0]?.msg || 'On my way'}</div>
            </div>
        `;
    }

    function renderProfile(role) {
        return `
            <div class="card">
                <div style="text-align:center;">
                    <div style="font-size:4rem;">👤</div>
                    <h3>${users[0].name}</h3>
                    <div>⭐ ${users[0].rating} · ${users[0].suburb}</div>
                    <div class="badge success">Verified</div>
                </div>
            </div>
            <div class="card">
                <div class="flex-row"><span>📞 Phone</span> <span>+61 412 345 678</span></div>
                <div class="flex-row"><span>📧 Email</span> <span>alex@email.com</span></div>
                <div class="flex-row"><span>🎂 Member since</span> <span>Jan 2024</span></div>
            </div>
            <div class="card">
                <div class="section-title">Payment Methods</div>
                <div>💳 Visa ending in 4242</div>
                <button class="btn btn-outline" style="margin-top:8px;">Add Payment Method</button>
            </div>
            <button class="btn btn-primary" style="width:100%;" onclick="window.app.showAuth()">Switch Account</button>
        `;
    }

    function renderDashboard(role) {
        if (role === 'admin') {
            return `
                <div class="flex-row">
                    <span class="badge primary">💰 Total: $8,240</span>
                    <span class="badge primary">📦 18 listings</span>
                    <span class="badge warning">⚠️ 2 disputes</span>
                </div>
                <div class="card">
                    <div class="flex-row"><b>User Management</b> <button class="btn" onclick="window.app.exportCSV()">Export CSV</button></div>
                    <table class="table-mini">
                        ${users.map(u => `<tr><td>${u.name}</td><td>${u.role}</td><td class="badge ${u.status === 'active' ? 'success' : 'error'}">${u.status}</td><td><button class="btn" onclick="window.app.toggleUser(${u.id})">${u.status === 'active' ? 'Suspend' : 'Reactivate'}</button></td></tr>`).join('')}
                    </table>
                </div>
                <div class="card">
                    <div><b>Listing Moderation</b></div>
                    <table class="table-mini">
                        ${listings.map(l => `<tr><td>${l.title}</td><td class="badge ${l.status}">${l.status}</td><td><button class="btn" onclick="window.app.moderateListing(${l.id})">${l.status === 'pending' ? 'Approve' : 'Disable'}</button></td></tr>`).join('')}
                    </table>
                </div>
                <div class="card">
                    <div><b>Payment Monitor</b></div>
                    <div>Stripe Connect balance: $4,200</div>
                    <div>Pending payouts: $580</div>
                    <div class="chart-bar" style="width:60%; margin-top:8px;"></div>
                </div>
            `;
        }
        return `<div class="card">Dashboard view for ${role}</div>`;
    }

    function renderListingDetail(listingId) {
        const listing = listings.find(l => l.id === listingId);
        if (!listing) return '<div>Listing not found</div>';
        return `
            <div class="card">
                <div style="font-size:4rem; text-align:center;">${listing.image}</div>
                <h2>${listing.title}</h2>
                <div class="flex-row">
                    <span class="badge">★ ${listing.rating}</span>
                    <span class="badge">${listing.suburb}</span>
                    <span class="badge">${listing.type}</span>
                </div>
                <p>${listing.description || 'Secure storage space'}</p>
                <div class="flex-row"><b>$${listing.weekly}/week</b> <span>size: ${listing.size}</span></div>
                <div class="flex-row">
                    <button class="btn btn-primary" onclick="window.app.requestBooking(${listing.id})">Request Booking</button>
                    <button class="btn" onclick="window.app.messageHost(${listing.hostId})">Message Host</button>
                </div>
            </div>
            <div class="card">
                <div><b>Hosted by ${listing.host}</b> · ⭐ 4.8</div>
                <button class="btn btn-outline" onclick="window.app.viewHostListings(${listing.hostId})">View all listings</button>
            </div>
        `;
    }

    function renderCreateListing(role) {
        return `
            <div class="card">
                <h3>Create New Listing</h3>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" placeholder="e.g., Secure Garage" id="listingTitle">
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="listingType">
                        <option>Garage</option>
                        <option>Spare Room</option>
                        <option>Storage Cage</option>
                        <option>Warehouse Corner</option>
                        <option>Parking Space</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Size (m²)</label>
                    <input type="number" id="listingSize">
                </div>
                <div class="form-group">
                    <label>Weekly Price ($)</label>
                    <input type="number" id="listingPrice">
                </div>
                <div class="form-group">
                    <label>Photos</label>
                    <div class="photo-upload" onclick="window.app.uploadPhoto()">+ Add Photo</div>
                </div>
                <button class="btn btn-primary" onclick="window.app.createListing()">Create Listing</button>
            </div>
        `;
    }

    // ==================== EVENT HANDLERS ====================
    function attachEventListeners() {
        // Role switcher
        document.querySelectorAll('#roleSwitcher button').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('#roleSwitcher button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                appState.currentRole = btn.dataset.role;
                renderPage(appState.currentPage, appState.currentRole);
                showToast(`Switched to ${appState.currentRole} view`);
            };
        });
    }

    // ==================== GLOBAL APP API ====================
    window.app = {
        showPage: (page) => {
            appState.currentPage = page;
            renderPage(page);
        },
        showListingDetail: (id) => {
            appState.currentPage = 'listing-detail';
            renderPage('listing-detail');
            // Override with specific listing
            document.getElementById('mainContent').innerHTML = renderListingDetail(id);
            attachEventListeners();
        },
        bookNow: (id) => {
            showToast('Booking requested! Host will respond shortly.');
        },
        requestBooking: (id) => {
            showToast('Booking request sent (status: requested)');
            setTimeout(() => showToast('💳 Payment summary: $120 + $10 fee'), 1000);
        },
        messageHost: (hostId) => {
            showToast('Opening chat with host...');
            app.showPage('messages');
        },
        acceptJob: (jobId) => {
            showToast('Job accepted! Please head to pickup location.');
        },
        showAuth: () => {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-card">
                    <h3>🔐 Sign In</h3>
                    <div class="form-group">
                        <label>Phone number</label>
                        <input type="tel" placeholder="+61 4..." value="+61412345678">
                    </div>
                    <button class="btn btn-primary" onclick="window.app.sendOTP()">Send OTP</button>
                    <p style="margin-top:10px; text-align:center;">⬆️ OTP: 123456 (demo)</p>
                    <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="this.closest('.modal-overlay').remove()">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        },
        sendOTP: () => {
            showToast('✅ Verification successful! Welcome back.');
            document.querySelector('.modal-overlay')?.remove();
        },
        showNotifications: () => {
            showToast(`🔔 You have ${appState.notifications} new notifications`);
        },
        filterBy: (type, value) => {
            showToast(`Filtered by ${type}: ${value}`);
        },
        showMap: () => {
            showToast('🗺️ Opening map view with 14 storage spots');
        },
        viewBooking: (id) => {
            showToast(`Booking #${id} details`);
        },
        openChat: (threadId) => {
            const chat = messages[threadId] || [{ from: 'System', msg: 'Start chatting' }];
            showToast(`💬 Chat opened: ${chat.length} messages`);
        },
        createListing: () => {
            showToast('✅ Listing created! Pending approval.');
        },
        uploadPhoto: () => {
            showToast('📸 Photo upload preview (dummy)');
        },
        exportCSV: () => {
            showToast('📁 Exporting CSV... (demo)');
        },
        toggleUser: (userId) => {
            showToast(`User ${userId} status toggled`);
        },
        moderateListing: (listingId) => {
            showToast(`Listing ${listingId} moderated`);
        },
        showReview: (bookingId) => {
            showToast('⭐ Rating submitted! Thank you.');
        }
    };

    // Initial render
    renderPage('home');

    // Add dummy payment success/failure simulation
    setTimeout(() => {
        console.log('Hire Neighbour fully functional');
    }, 100);
})();
</script>
</body>
</html>
